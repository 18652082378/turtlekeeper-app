<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>壳友手账支持</title>
    <style>
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #1f2933; background: #f6f7f5; line-height: 1.7; }
      main { max-width: 720px; margin: 0 auto; padding: 32px 20px 56px; }
      h1 { margin: 0 0 10px; font-size: 28px; }
      h2 { margin-top: 26px; font-size: 18px; }
      p, li { font-size: 15px; }
      .card { background: #fff; border: 1px solid #e6ebe7; border-radius: 14px; padding: 24px; box-shadow: 0 12px 30px rgba(30, 45, 35, .08); }
      .muted { color: #64748b; }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>壳友手账支持</h1>
        <p class="muted">感谢使用壳友手账。</p>
        <h2>常见问题</h2>
        <ul>
          <li>收不到验证码：请确认手机号正确，并等待 60 秒后重试。</li>
          <li>图片无法上传：请确认已允许 App 访问相册。</li>
          <li>数据展示异常：请先退出账号后重新登录。</li>
        </ul>
        <h2>联系支持</h2>
        <p>如需反馈问题、提出建议或申请删除账号数据，请通过 App 内“空间 - 意见反馈”提交。</p>
        <p>隐私政策：<a href="/privacy.html">查看隐私政策</a></p>
      </section>
    </main>
  </body>
</html>
