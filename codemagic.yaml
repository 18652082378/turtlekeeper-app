workflows:
  ios-testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: app_store_connect
    environment:
      node: 24
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.turtlekeeper.app
      vars:
        BUNDLE_ID: "com.turtlekeeper.app"
    scripts:
      - name: Install dependencies
        script: |
          npm ci || npm install
      - name: Build web assets
        script: |
          # Bundle all species thumbnails into the IPA. They are never fetched
          # from the app server or from the user's phone at runtime.
          node scripts/download-species-assets.js
          npm run build
      - name: Create and sync iOS project
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios
      - name: Apply signing profiles
        script: |
          xcode-project use-profiles
      - name: Build IPA
        script: |
          set +e
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App
          build_status=$?
          if [ "$build_status" -ne 0 ]; then
            echo "===== Xcode detailed error log ====="
            if [ -d /tmp/xcodebuild_logs ]; then
              find /tmp/xcodebuild_logs -type f -name "*.log" -print -exec tail -n 160 {} \;
            else
              echo "No detailed Xcode log directory was created."
            fi
            exit "$build_status"
          fi
    artifacts:
      - build/ios/ipa/*.ipa
      # Keep the full Xcode archive log. Codemagic's summary only shows exit code 65.
      - /tmp/xcodebuild_logs/*.log
      - /Users/builder/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
