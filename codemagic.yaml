workflows:
  ios-testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: app_store_connect
    environment:
      node: 24
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.turtlekeeper.app
      vars:
        BUNDLE_ID: "com.turtlekeeper.app"
    scripts:
      - name: Install dependencies
        script: |
          npm ci || npm install
      - name: Build web assets
        script: |
          npm run build
      - name: Create and sync iOS project
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi
          npx cap sync ios
      - name: Apply signing profiles
        script: |
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - /Users/builder/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
